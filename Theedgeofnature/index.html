<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<!-- Scroll-Section-1 jQuery --> 
<script>
$(document).ready(function () {

  var scrollAmount = 340; // how far to jump each click (px)

  // Next arrow — scroll right
  $('#galleryNext').click(function () {
    $('.gallery-viewport').animate(
      { scrollLeft: $('.gallery-viewport').scrollLeft() + scrollAmount },
      400  // animation speed in ms
    );
  });

  // Prev arrow — scroll left
  $('#galleryPrev').click(function () {
    $('.gallery-viewport').animate(
      { scrollLeft: $('.gallery-viewport').scrollLeft() - scrollAmount },
      400
    );
  });

});
</script>
